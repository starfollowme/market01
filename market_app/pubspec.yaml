name: market_app
description: Market - Toko Online Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP & API
  dio: ^5.7.0
  # State management
  provider: ^6.1.2
  # Local storage (token)
  shared_preferences: ^2.3.3
  # Navigation
  go_router: ^14.6.2
  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  # Animations & UI enhancements
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  badges: ^3.1.2
  lottie: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
